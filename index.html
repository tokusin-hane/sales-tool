<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>営業管理｜トクシングループ</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--blue:#2563AB;--teal:#0D9488;--dark:#1E293B;--gray:#64748B;--lgray:#F1F5F9;--border:#E2E8F0;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;background:#F8FAFC;color:var(--dark);min-height:100vh;}
.loading{text-align:center;padding:60px;color:var(--gray);}
</style>
</head>
<body>
<div id="login-screen" style="display:flex;position:fixed;inset:0;background:#F8FAFC;z-index:999;align-items:center;justify-content:center;padding:20px;">
  <div style="background:white;border:1.5px solid var(--border);border-radius:20px;padding:36px 32px;max-width:400px;width:100%;">
    <div style="font-size:26px;text-align:center;margin-bottom:14px;">📊</div>
    <div style="font-size:18px;font-weight:800;text-align:center;margin-bottom:4px;">営業管理ツール</div>
    <div style="font-size:12px;color:var(--gray);text-align:center;margin-bottom:24px;">トクシングループ</div>
    <input id="login-email" type="email" placeholder="email@example.com" style="width:100%;background:var(--lgray);border:1.5px solid var(--border);border-radius:9px;padding:12px 15px;font-size:14px;outline:none;margin-bottom:14px;">
    <input id="login-pass" type="password" placeholder="パスワード" style="width:100%;background:var(--lgray);border:1.5px solid var(--border);border-radius:9px;padding:12px 15px;font-size:14px;outline:none;margin-bottom:20px;">
    <button onclick="doLogin()" style="width:100%;background:linear-gradient(135deg,var(--blue),var(--teal));color:white;border:none;border-radius:11px;font-size:16px;font-weight:700;padding:14px;cursor:pointer;">ログイン</button>
    <div id="login-err" style="margin-top:10px;font-size:12.5px;color:#DC2626;text-align:center;display:none;"></div>
  </div>
</div>
<script>
const _sb=supabase.createClient("https://ujpgjhbsafhtbubrktrm.supabase.co","sb_publishable_wymsscaB_WUutrPr-VpcTA_LBGGn96T");
let _user=null,_companies=[],_deals=[],_currentDealId=null,_prevPage="dashboard";
const SYSTEM_MAP={r_overseas:"特定技能（海外）",r_domestic:"特定技能（国内）",r_ikusei:"育成就労",r_gijin:"技人国",r_ginou:"技能実習"};
const STATUS_MAP={prospect:{label:"見込み",color:"#D97706",bg:"#FFFBEB",border:"#FCD34D"},negotiating:{label:"商談中",color:"#2563AB",bg:"#EFF6FF",border:"#93C5FD"},contract:{label:"契約済",color:"#16A34A",bg:"#F0FDF4",border:"#BBF7D0"},working:{label:"就労中",color:"#0D9488",bg:"#F0FDFA",border:"#99F6E4"},lost:{label:"失注",color:"#DC2626",bg:"#FEF2F2",border:"#FCA5A5"},hearing_done:{label:"ヒアリング済",color:"#5B21B6",bg:"#F5F3FF",border:"#C4B5FD"}};
const COUNTRY_MAP={vietnam:"ベトナム🇻🇳",indonesia:"インドネシア🇮🇩",myanmar:"ミャンマー🇲🇲",undecided:"未定"};
const LOG_TYPE_MAP={visit:"📍 訪問",call:"📞 電話",email:"✉️ メール",online:"💻 オンライン",other:"📝 その他"};
async function doLogin(){const email=document.getElementById("login-email").value.trim(),pass=document.getElementById("login-pass").value,errEl=document.getElementById("login-err");errEl.style.display="none";const{data,error}=await _sb.auth.signInWithPassword({email,password:pass});if(error){errEl.textContent="ログインに失敗しました："+error.message;errEl.style.display="block";return;}_user=data.user;showApp();}
async function doLogout(){await _sb.auth.signOut();_user=null;document.getElementById("app").style.display="none";document.getElementById("login-screen").style.display="flex";}
(async()=>{document.getElementById("login-screen").style.display="flex";const{data:{session}}=await _sb.auth.getSession();if(session){_user=session.user;showApp();}})();
function showApp(){document.getElementById("login-screen").style.display="none";document.getElementById("app").style.display="block";document.getElementById("sb-user-email").textContent=_user?.email||"";loadAll();}
async function loadAll(){const[c,d]=await Promise.all([_sb.from("companies").select("*").order("created_at",{ascending:false}),_sb.from("deals").select("*,companies(name,industry,area)").order("created_at",{ascending:false})]);_companies=c.data||[];_deals=d.data||[];renderDashboard();renderCompanies();renderPipeline();}
function showPage(page){["dashboard","companies","pipeline","detail"].forEach(p=>{document.getElementById("page-"+p).style.display=p===page?"block":"none";});document.querySelectorAll(".sb-item").forEach(el=>el.classList.remove("active"));const nav=document.getElementById("nav-"+page);if(nav)nav.classList.add("active");const titles={dashboard:"ダッシュボード",companies:"企業一覧",pipeline:"案件パイプライン",detail:"案件詳細"};document.getElementById("topbar-title").textContent=titles[page]||"";closeSidebar();}
function goBack(){showPage(_prevPage);}
function renderDashboard(){const active=_deals.filter(d=>["prospect","negotiating"].includes(d.status)).length,closed=_deals.filter(d=>d.status==="contract"||d.status==="working").length,workers=_deals.filter(d=>d.status==="working").reduce((s,d)=>s+(d.headcount||0),0);document.getElementById("kpi-companies").textContent=_companies.length;document.getElementById("kpi-active").textContent=active;document.getElementById("kpi-closed").textContent=closed;document.getElementById("kpi-workers").textContent=workers;const rd=document.getElementById("recent-deals"),recentDeals=_deals.slice(0,5);if(!recentDeals.length){rd.innerHTML="<div style=\"text-align:center;padding:24px;color:var(--gray)\">案件がありません</div>";return;}rd.innerHTML=recentDeals.map(d=>{const st=STATUS_MAP[d.status]||STATUS_MAP.prospect;return `<div style="display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer;" onclick="openDeal('${d.id}','dashboard')"><div style="width:34px;height:34px;border-radius:9px;background:${st.bg};display:flex;align-items:center;justify-content:center;">${SYSTEM_MAP[d.system]?"🌏":"📋"}</div><div style="flex:1"><div style="font-size:13.5px;font-weight:600;">${d.companies?.name||"(企業名なし)"}</div><div style="font-size:11.5px;color:var(--gray);">${SYSTEM_MAP[d.system]||d.system} ・ ${d.headcount||1}名</div></div><span style="background:${st.bg};color:${st.color};border:1px solid ${st.border};border-radius:5px;padding:2px 8px;font-size:11px;font-weight:700;">${st.label}</span></div>`;}).join("");const rc=document.getElementById("recent-companies"),recentCos=_companies.slice(0,5);if(!recentCos.length){rc.innerHTML="<div style=\"text-align:center;padding:24px;color:var(--gray)\">企業がありません</div>";return;}rc.innerHTML=recentCos.map(c=>`<div style="display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer;" onclick="showPage('companies')"><div style="width:34px;height:34px;border-radius:9px;background:#EFF6FF;display:flex;align-items:center;justify-content:center;">🏢</div><div><div style="font-size:13.5px;font-weight:600;">${c.name}</div><div style="font-size:11.5px;color:var(--gray);">${c.industry||"業種未設定"} ${c.area?"・"+c.area:""}</div></div></div>`).join("");}
function renderCompanies(filter=""){const grid=document.getElementById("company-grid"),list=filter?_companies.filter(c=>c.name?.includes(filter)||c.industry?.includes(filter)):_companies;if(!list.length){grid.innerHTML="<div style=\"grid-column:1/-1;text-align:center;padding:48px;color:var(--gray)\">企業が見つかりません</div>";return;}grid.innerHTML=list.map(c=>{const deals=_deals.filter(d=>d.company_id===c.id),activeDeal=deals.find(d=>["prospect","negotiating"].includes(d.status));return `<div style="background:white;border:1.5px solid var(--border);border-radius:14px;padding:18px 20px;cursor:pointer;" onclick="openCompanyDeals('${c.id}')"><div style="font-size:15px;font-weight:800;margin-bottom:4px;">${c.name}</div><div style="font-size:12px;color:var(--gray);margin-bottom:10px;">${c.industry||""}${c.area?" ・ "+c.area:""}${c.contact_person?" ・ "+c.contact_person+"様":""}</div><div style="display:flex;gap:6px;flex-wrap:wrap;">${deals.length?`<span style="background:#EFF6FF;color:#1D4ED8;border:1px solid #93C5FD;border-radius:5px;padding:3px 9px;font-size:11.5px;font-weight:700;">案件${deals.length}件</span>`:""}${activeDeal?`<span style="background:#F0FDF4;color:#166534;border:1px solid #BBF7D0;border-radius:5px;padding:3px 9px;font-size:11.5px;font-weight:700;">${STATUS_MAP[activeDeal.status]?.label||""}</span>`:""}${!deals.length?"<span style=\"background:var(--lgray);color:var(--gray);border:1px solid var(--border);border-radius:5px;padding:3px 9px;font-size:11.5px;font-weight:700;\">未案件</span>":""}</div></div>`;}).join("");}
function filterCompanies(){renderCompanies(document.getElementById("company-search").value);}
function openCompanyDeals(cid){const deals=_deals.filter(d=>d.company_id===cid);if(deals.length===1){openDeal(deals[0].id,"companies");return;}if(deals.length>1){showPage("pipeline");return;}openNewDealModal(cid);}
const PIPELINE_COLS=[{id:"prospect",label:"見込み",color:"#D97706",bg:"#FFFBEB"},{id:"negotiating",label:"商談中",color:"#2563AB",bg:"#EFF6FF"},{id:"contract",label:"契約済",color:"#16A34A",bg:"#F0FDF4"},{id:"working",label:"就労中",color:"#0D9488",bg:"#F0FDFA"},{id:"lost",label:"失注",color:"#DC2626",bg:"#FEF2F2"}];
function renderPipeline(filter=""){const wrap=document.getElementById("pipeline-wrap"),deals=filter?_deals.filter(d=>(d.companies?.name||"").includes(filter)):_deals;wrap.innerHTML=PIPELINE_COLS.map(col=>{const colDeals=deals.filter(d=>d.status===col.id),total=colDeals.reduce((s,d)=>s+(d.headcount||0),0);return `<div style="min-width:260px;flex-shrink:0;"><div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:10px 10px 0 0;background:${col.bg};color:${col.color};font-size:13px;font-weight:700;"><span>${col.label}</span><span style="font-size:11px;">${colDeals.length}件 / ${total}名</span></div><div style="background:#F8FAFC;border:1.5px solid var(--border);border-top:none;border-radius:0 0 10px 10px;padding:10px;min-height:120px;display:flex;flex-direction:column;gap:8px;">${colDeals.length?colDeals.map(d=>`<div style="background:white;border:1.5px solid var(--border);border-radius:10px;padding:13px 14px;cursor:pointer;" onclick="openDeal('${d.id}','pipeline')"><div style="font-size:13.5px;font-weight:700;margin-bottom:4px;">${d.companies?.name||"(企業名なし)"}</div><div style="font-size:11.5px;color:var(--gray);">${SYSTEM_MAP[d.system]||d.system}</div><div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px;"><span style="font-size:12px;color:var(--gray);">${COUNTRY_MAP[d.country]||""} ・ ${d.headcount||1}名</span><span style="font-size:12px;font-weight:700;color:var(--teal);">${d.headcount?"管理費 ¥"+(d.headcount*30000).toLocaleString("/月"):""}</span></div></div>`).join(""):"<div style=\"font-size:12px;color:var(--gray);text-align:center;padding:16px;\">なし</div>"}</div></div>`;}).join("");}
function filterDeals(){renderPipeline(document.getElementById("deal-search").value);}
async function openDeal(dealId,from="dashboard"){_prevPage=from;_currentDealId=dealId;showPage("detail");const deal=_deals.find(d=>d.id===dealId);if(!deal)return;const co=_companies.find(c=>c.id===deal.company_id)||deal.companies||{},st=STATUS_MAP[deal.status]||STATUS_MAP.prospect;document.getElementById("detail-main").innerHTML=`<div style="font-size:13px;font-weight:700;color:var(--gray);border-bottom:1.5px solid var(--border);padding-bottom:9px;margin-bottom:14px;">案件情報</div><div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;"><div><div style="font-size:18px;font-weight:900;margin-bottom:4px;">${co.name||"(企業名なし)"}</div><span style="background:${st.bg};color:${st.color};border:1px solid ${st.border};border-radius:6px;padding:3px 10px;font-size:12px;font-weight:700;">${st.label}</span></div><select onchange="updateDealStatus('${dealId}',this.value)" style="margin-left:auto;background:var(--lgray);border:1.5px solid var(--border);border-radius:8px;padding:7px 12px;font-size:13px;outline:none;">${Object.entries(STATUS_MAP).map(([k,v])=>`<option value="${k}" ${deal.status===k?"selected":""}>${v.label}</option>`).join("")}</select></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;"><div style="background:var(--lgray);border-radius:8px;padding:10px 12px;"><div style="font-size:10.5px;font-weight:700;color:var(--gray);margin-bottom:3px;">制度</div><div style="font-size:13.5px;font-weight:600;">${SYSTEM_MAP[deal.system]||"-"}</div></div><div style="background:var(--lgray);border-radius:8px;padding:10px 12px;"><div style="font-size:10.5px;font-weight:700;color:var(--gray);margin-bottom:3px;">採用人数</div><div style="font-size:13.5px;font-weight:600;">${deal.headcount||1}名</div></div><div style="background:var(--lgray);border-radius:8px;padding:10px 12px;"><div style="font-size:10.5px;font-weight:700;color:var(--gray);margin-bottom:3px;">国籍</div><div style="font-size:13.5px;font-weight:600;">${COUNTRY_MAP[deal.country]||"-"}</div></div><div style="background:var(--lgray);border-radius:8px;padding:10px 12px;"><div style="font-size:10.5px;font-weight:700;color:var(--gray);margin-bottom:3px;">日本語レベル</div><div style="font-size:13.5px;font-weight:600;">${deal.japanese_level||"-"}</div></div>${deal.memo?`<div style="background:var(--lgray);border-radius:8px;padding:10px 12px;grid-column:1/-1;"><div style="font-size:10.5px;font-weight:700;color:var(--gray);margin-bottom:3px;">メモ</div><div style="font-size:13px;line-height:1.6;">${deal.memo}</div></div>`:""}</div>`;document.getElementById("detail-company").innerHTML=`<div style="font-size:13px;font-weight:700;color:var(--gray);border-bottom:1.5px solid var(--border);padding-bottom:9px;margin-bottom:14px;">企業情報</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;"><div style="background:var(--lgray);border-radius:8px;padding:10px 12px;grid-column:1/-1;"><div style="font-size:10.5px;font-weight:700;color:var(--gray);margin-bottom:3px;">企業名</div><div style="font-size:13.5px;font-weight:600;">${co.name||"-"}</div></div><div style="background:var(--lgray);border-radius:8px;padding:10px 12px;"><div style="font-size:10.5px;font-weight:700;color:var(--gray);margin-bottom:3px;">業種</div><div style="font-size:13.5px;font-weight:600;">${co.industry||"-"}</div></div><div style="background:var(--lgray);border-radius:8px;padding:10px 12px;"><div style="font-size:10.5px;font-weight:700;color:var(--gray);margin-bottom:3px;">エリア</div><div style="font-size:13.5px;font-weight:600;">${co.area||"-"}</div></div><div style="background:var(--lgray);border-radius:8px;padding:10px 12px;"><div style="font-size:10.5px;font-weight:700;color:var(--gray);margin-bottom:3px;">担当者</div><div style="font-size:13.5px;font-weight:600;">${co.contact_person||"-"}</div></div><div style="background:var(--lgray);border-radius:8px;padding:10px 12px;"><div style="font-size:10.5px;font-weight:700;color:var(--gray);margin-bottom:3px;">電話</div><div style="font-size:13.5px;font-weight:600;">${co.phone||"-"}</div></div></div>`;const{data:ests}=await _sb.from("estimates").select("*").eq("deal_id",dealId);const est=ests?.[0];document.getElementById("detail-estimate").innerHTML=`<div style="font-size:13px;font-weight:700;color:var(--gray);border-bottom:1.5px solid var(--border);padding-bottom:9px;margin-bottom:14px;">見積</div>${est?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;"><div style="background:var(--lgray);border-radius:8px;padding:10px 12px;grid-column:1/-1;"><div style="font-size:10.5px;font-weight:700;color:var(--gray);margin-bottom:3px;">初期費用</div><div style="font-size:13.5px;font-weight:600;color:var(--teal);">¥${est.initial_min?.toLocaleString()} 〜 ¥${est.initial_max?.toLocaleString()}</div></div><div style="background:var(--lgray);border-radius:8px;padding:10px 12px;"><div style="font-size:10.5px;font-weight:700;color:var(--gray);margin-bottom:3px;">月額管理費</div><div style="font-size:13.5px;font-weight:600;">¥${est.monthly?.toLocaleString()}/月</div></div></div>`:"<div style=\"font-size:13px;color:var(--gray)\">見積データなし</div>"}`;loadLogs(dealId);document.getElementById("log-date").value=new Date().toISOString().split("T")[0];}
async function loadLogs(dealId){const{data:logs}=await _sb.from("activities").select("*").eq("deal_id",dealId).order("created_at",{ascending:false});const el=document.getElementById("log-list");if(!logs||!logs.length){el.innerHTML="<div style=\"text-align:center;padding:24px;color:var(--gray)\">まだログがありません</div>";return;}el.innerHTML=logs.map(l=>`<div style="display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);"><div style="width:32px;height:32px;border-radius:8px;background:var(--lgray);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;">${(LOG_TYPE_MAP[l.type]||"📝").split(" ")[0]}</div><div style="flex:1;"><div style="font-size:11px;color:var(--gray);margin-bottom:3px;">${new Date(l.created_at).toLocaleDateString("ja-JP")} ・ ${LOG_TYPE_MAP[l.type]||l.type}</div><div style="font-size:13px;line-height:1.6;">${l.memo||""}</div></div></div>`).join("");}
async function addLog(){if(!_currentDealId)return;const type=document.getElementById("log-type").value,memo=document.getElementById("log-memo").value.trim(),date=document.getElementById("log-date").value;if(!memo)return;await _sb.from("activities").insert({deal_id:_currentDealId,type,memo,activity_date:date||null});document.getElementById("log-memo").value="";loadLogs(_currentDealId);}
async function updateDealStatus(dealId,status){await _sb.from("deals").update({status}).eq("id",dealId);const d=_deals.find(d=>d.id===dealId);if(d)d.status=status;renderDashboard();renderPipeline();}
function openNewDealModal(presetCompanyId=null){const sel=document.getElementById("deal-company-select");sel.innerHTML="<option value=\"\">選択してください</option>"+_companies.map(c=>`<option value="${c.id}" ${c.id===presetCompanyId?"selected":""}>${c.name}</option>`).join("");document.getElementById("modal-deal").classList.add("open");}
async function saveDeal(){const cid=document.getElementById("deal-company-select").value;if(!cid){alert("企業を選択してください");return;}const{data}=await _sb.from("deals").insert({company_id:cid,system:document.getElementById("deal-system").value,headcount:parseInt(document.getElementById("deal-headcount").value)||1,country:document.getElementById("deal-country").value,status:document.getElementById("deal-status").value,memo:document.getElementById("deal-memo").value,temperature:"warm",created_by:_user?.id||null}).select("*,companies(name,industry,area)");if(data){_deals.unshift(data[0]);}closeModal("modal-deal");renderDashboard();renderPipeline();}
function openNewCompanyModal(){document.getElementById("modal-company").classList.add("open");}
async function saveCompany(){const name=document.getElementById("co-name").value.trim();if(!name){alert("企業名を入力してください");return;}const{data}=await _sb.from("companies").insert({name,industry:document.getElementById("co-industry").value,area:document.getElementById("co-area").value,contact_person:document.getElementById("co-person").value,phone:document.getElementById("co-tel").value,email:document.getElementById("co-email").value,status:"uncont",temperature:"warm"}).select();if(data){_companies.unshift(data[0]);}closeModal("modal-company");renderCompanies();renderDashboard();["co-name","co-industry","co-area","co-person","co-tel","co-email"].forEach(id=>document.getElementById(id).value="");}
function closeModal(id){document.getElementById(id).classList.remove("open");}
function openSidebar(){document.getElementById("sidebar").classList.add("open");document.getElementById("sb-overlay").classList.add("open");}
function closeSidebar(){document.getElementById("sidebar").classList.remove("open");document.getElementById("sb-overlay").classList.remove("open");}
</script>
</body>
</html>
